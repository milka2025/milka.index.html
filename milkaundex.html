<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Найди пару 💗</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffd6e7, #ffc0d9, #ffe8f3);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8a2452;
      overflow: hidden;
      position: relative;
      padding: 20px;
    }

    .container {
      width: 98%;
      max-width: 1300px;
      background: rgba(255, 245, 250, 0.92);
      border: 2px solid #f7b1cc;
      border-radius: 24px;
      box-shadow: 0 12px 35px rgba(180, 50, 110, 0.18);
      padding: 32px 24px;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 42px;
      color: #d81b60;
    }

    .subtitle {
      margin-bottom: 22px;
      font-size: 20px;
      color: #a63a67;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .stat {
      background: #ffe3ef;
      border: 2px solid #f7b1cc;
      border-radius: 999px;
      padding: 12px 20px;
      font-weight: bold;
      font-size: 18px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 22px;
    }

    .card {
      height: 190px;
      perspective: 1000px;
      cursor: pointer;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }

    .card.flipped .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      inset: 0;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 16px;
      backface-visibility: hidden;
      box-shadow: 0 8px 18px rgba(194, 24, 91, 0.15);
      font-weight: bold;
    }

    .front {
      background: linear-gradient(135deg, #ff6fa7, #ffb6d9);
      color: white;
      font-size: 44px;
    }

    .back {
      background: #fff4f9;
      color: #c2185b;
      border: 2px solid #f6a8c5;
      transform: rotateY(180deg);
      font-size: 28px;
      line-height: 1.25;
    }

    .matched .back {
      background: #ffd9e8;
      border-color: #e75480;
    }

    .controls {
      margin-top: 28px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 24px;
      background: #e91e63;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      background: #d81b60;
    }

    .message {
      margin-top: 20px;
      min-height: 34px;
      font-size: 26px;
      font-weight: bold;
      color: #b01758;
    }

    .heart {
      position: absolute;
      font-size: 24px;
      color: rgba(255, 255, 255, 0.7);
      animation: floatUp linear infinite;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes floatUp {
      from {
        transform: translateY(0);
        opacity: 0;
      }
      15% {
        opacity: 1;
      }
      to {
        transform: translateY(-120vh);
        opacity: 0;
      }
    }

    @media (max-width: 1000px) {
      .board {
        grid-template-columns: repeat(3, 1fr);
      }

      .card {
        height: 170px;
      }

      .back {
        font-size: 24px;
      }
    }

    @media (max-width: 700px) {
      .board {
        grid-template-columns: repeat(2, 1fr);
      }

      .card {
        height: 145px;
      }

      h1 {
        font-size: 34px;
      }

      .back {
        font-size: 20px;
      }

      .front {
        font-size: 36px;
      }
    }
  </style>
</head>
<body>
  <div id="hearts"></div>

  <div class="container">
    <h1>Найди пару 💗</h1>
    <div class="subtitle">Открой все одинаковые карточки</div>

    <div class="stats">
      <div class="stat">Ходы: <span id="moves">0</span></div>
      <div class="stat">Пары: <span id="pairs">0</span>/7</div>
    </div>

    <div class="board" id="board"></div>

    <div class="controls">
      <button onclick="startGame()">Играть заново</button>
    </div>

    <div class="message" id="message"></div>
  </div>

  <script>
    const items = [
      "Катя",
      "20 лет",
      "Конный спорт",
      "Кондитерка",
      "МГУ",
      "Розовый цвет",
      "Люблю животных"
    ];

    const board = document.getElementById("board");
    const movesEl = document.getElementById("moves");
    const pairsEl = document.getElementById("pairs");
    const messageEl = document.getElementById("message");
    const heartsEl = document.getElementById("hearts");

    let firstCard = null;
    let secondCard = null;
    let lockBoard = false;
    let moves = 0;
    let matchedPairs = 0;

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function createHearts() {
      heartsEl.innerHTML = "";
      for (let i = 0; i < 16; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.textContent = Math.random() > 0.5 ? "❤" : "💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.bottom = "-40px";
        heart.style.animationDuration = (6 + Math.random() * 6) + "s";
        heart.style.animationDelay = (Math.random() * 6) + "s";
        heart.style.fontSize = (16 + Math.random() * 18) + "px";
        heartsEl.appendChild(heart);
      }
    }

    function startGame() {
      const cards = shuffle([...items, ...items]);

      board.innerHTML = "";
      moves = 0;
      matchedPairs = 0;
      firstCard = null;
      secondCard = null;
      lockBoard = false;

      movesEl.textContent = moves;
      pairsEl.textContent = matchedPairs;
      messageEl.textContent = "";

      cards.forEach((item) => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.value = item;

        card.innerHTML = `
          <div class="card-inner">
            <div class="face front">💗</div>
            <div class="face back">${item}</div>
          </div>
        `;

        card.addEventListener("click", flipCard);
        board.appendChild(card);
      });
    }

    function flipCard() {
      if (lockBoard) return;
      if (this === firstCard) return;
      if (this.classList.contains("matched")) return;
      if (this.classList.contains("flipped")) return;

      this.classList.add("flipped");

      if (!firstCard) {
        firstCard = this;
        return;
      }

      secondCard = this;
      moves++;
      movesEl.textContent = moves;

      checkMatch();
    }

    function checkMatch() {
      const isMatch = firstCard.dataset.value === secondCard.dataset.value;

      if (isMatch) {
        firstCard.classList.add("matched");
        secondCard.classList.add("matched");
        matchedPairs++;
        pairsEl.textContent = matchedPairs;

        resetTurn();

        if (matchedPairs === items.length) {
          messageEl.textContent = "Ура! Все пары найдены ✨";
        }
      } else {
        lockBoard = true;
        setTimeout(() => {
          firstCard.classList.remove("flipped");
          secondCard.classList.remove("flipped");
          resetTurn();
        }, 850);
      }
    }

    function resetTurn() {
      firstCard = null;
      secondCard = null;
      lockBoard = false;
    }

    createHearts();
    startGame();
  </script>
</body>
</html>
